openapi: 3.1.0
info:
  title: MTG GPT Card Database
  description: Redis-backed Magic card database and pack simulator for Custom GPT Actions. Compact card data comes from the imported Scryfall CSV in Upstash; full card details come from Scryfall on demand.
  version: 2.0.0

servers:
  - url: https://mtg-gpt-five.vercel.app

security:
  - bearerAuth: []

paths:
  /api/set-cards:
    get:
      operationId: getSetCards
      summary: Get cards from an imported set database
      description: Returns compact card records from the Redis-backed set database. Use this for set browsing, filtering by rarity/color, limited analysis, and finding candidate cards before requesting full Scryfall details.
      parameters:
        - name: set
          in: query
          required: true
          description: Lowercase set code, for example "msh".
          schema:
            type: string
            example: msh
        - name: page
          in: query
          required: false
          description: Page number to retrieve. Starts at 1.
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          required: false
          description: Number of cards per page. Maximum supported by the API is 100.
          schema:
            type: integer
            default: 75
            minimum: 1
            maximum: 100
        - name: rarity
          in: query
          required: false
          description: Optional rarity filter. Use common, uncommon, rare, or mythic.
          schema:
            type: string
            enum:
              - common
              - uncommon
              - rare
              - mythic
        - name: color
          in: query
          required: false
          description: Optional color filter. Use W, U, B, R, G, or C for colorless.
          schema:
            type: string
            enum:
              - W
              - U
              - B
              - R
              - G
              - C
      responses:
        "200":
          description: Compact paginated card list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetCardsResponse"
        "400":
          description: Missing or invalid set code.
        "500":
          description: Internal server error.

  /api/card:
    get:
      operationId: getImportedCard
      summary: Get one compact imported card
      description: Looks up one compact card from the Redis-backed database by Scryfall ID, exact imported name, or collector number.
      parameters:
        - name: set
          in: query
          required: true
          description: Lowercase set code, for example "msh".
          schema:
            type: string
            example: msh
        - name: id
          in: query
          required: false
          description: Scryfall UUID for the card.
          schema:
            type: string
        - name: name
          in: query
          required: false
          description: Exact card name as imported from the CSV.
          schema:
            type: string
        - name: number
          in: query
          required: false
          description: Collector number as imported from the CSV.
          schema:
            type: string
      responses:
        "200":
          description: Compact imported card found.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  set:
                    type: string
                  card:
                    $ref: "#/components/schemas/CompactCard"
                required:
                  - set
                  - card
        "400":
          description: Missing set code or missing lookup parameter.
        "404":
          description: Card not found.
        "500":
          description: Internal server error.

  /api/card-detail:
    get:
      operationId: getFullScryfallCardDetail
      summary: Get full Scryfall details for a card
      description: Resolves a card by Scryfall ID, or by set plus name from the imported database, then fetches the full card object from Scryfall. Use this when oracle text, card faces, rulings URI, legalities, or other detailed fields are needed.
      parameters:
        - name: id
          in: query
          required: false
          description: Scryfall UUID for the card. Preferred when already known.
          schema:
            type: string
        - name: set
          in: query
          required: false
          description: Lowercase set code, required when looking up by name.
          schema:
            type: string
            example: msh
        - name: name
          in: query
          required: false
          description: Exact card name from the imported database. Requires set.
          schema:
            type: string
      responses:
        "200":
          description: Full Scryfall card object.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  card:
                    type: object
                    additionalProperties: true
                required:
                  - card
        "400":
          description: Provide either id, or set plus name.
        "404":
          description: Card not found in local database.
        "500":
          description: Scryfall or proxy error.

  /api/simulate-pack:
    get:
      operationId: simulatePack
      summary: Simulate opening a booster pack
      description: Simulates a booster pack using the imported card database and a local product collation config. Use this whenever the user asks to open, simulate, generate, or build a pack from a set.
      parameters:
        - name: set
          in: query
          required: true
          description: Lowercase set code, for example "msh".
          schema:
            type: string
            example: msh
        - name: type
          in: query
          required: true
          description: Product type to simulate.
          schema:
            type: string
            enum:
              - play_booster
              - collector_booster
              - jumpstart_booster
              - prerelease_pool
            example: play_booster
      responses:
        "200":
          description: Simulated booster pack.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimulatedPackResponse"
        "400":
          description: Missing set code or invalid product type.
        "500":
          description: Internal server error.

  /api/cards/search:
    get:
      operationId: searchCards
      summary: Search canonical Magic cards
      parameters:
        - { name: name, in: query, schema: { type: string } }
        - { name: set, in: query, schema: { type: string } }
        - { name: number, in: query, schema: { type: string } }
        - { name: color, in: query, schema: { type: string } }
        - { name: type, in: query, schema: { type: string } }
      responses:
        "200": { description: Matching cards }
        "401": { description: Authentication failed }

  /api/cards/details:
    get:
      operationId: getCardDetails
      summary: Get canonical card details
      parameters:
        - { name: id, in: query, schema: { type: string } }
        - { name: name, in: query, schema: { type: string } }
        - { name: set, in: query, schema: { type: string } }
        - { name: number, in: query, schema: { type: string } }
      responses:
        "200": { description: Full Scryfall card details }
        "404": { description: Card not found }

  /api/collection/import:
    post:
      operationId: importCollection
      summary: Import a physical card collection
      description: Imports and synchronizes a complete collection export. Invoke only after the user explicitly requests an import or synchronization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [source, csv, mode, confirmed]
              properties:
                source: { type: string, enum: [manabox] }
                filename: { type: string }
                csv: { type: string, description: Raw CSV content from the ManaBox export. }
                mode: { type: string, enum: [synchronize] }
                confirmed: { type: boolean, const: true }
      responses:
        "200": { description: Import completed or was already current }
        "400": { description: Invalid or unsupported collection export }
        "401": { description: Authentication failed }

  /api/collection/search:
    get:
      operationId: searchCollection
      summary: Search active owned cards
      parameters:
        - { name: name, in: query, schema: { type: string } }
        - { name: scryfall_id, in: query, schema: { type: string } }
        - { name: set, in: query, schema: { type: string } }
        - { name: collector_number, in: query, schema: { type: string } }
        - { name: location, in: query, schema: { type: string } }
        - { name: finish, in: query, schema: { type: string, enum: [nonfoil, foil, etched] } }
        - { name: condition, in: query, schema: { type: string } }
        - { name: language, in: query, schema: { type: string } }
      responses:
        "200": { description: Matching active collection entries }

  /api/collection/stats:
    get:
      operationId: getCollectionStats
      summary: Get physical collection statistics
      responses:
        "200": { description: Collection totals and grouped statistics }

  /api/collection/check-deck:
    post:
      operationId: checkDeckAgainstCollection
      summary: Check deterministic deck ownership coverage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decklist]
              properties:
                decklist: { type: string }
                match_printing: { type: boolean, default: false }
                include_locations: { type: boolean, default: true }
      responses:
        "200": { description: Owned, partially owned, and missing cards }

  /api/decks/analyze:
    post:
      operationId: analyzeDeck
      summary: Analyze a decklist into structured facts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decklist]
              properties:
                decklist: { type: string }
                format: { type: string }
                include_collection: { type: boolean, default: false }
      responses:
        "200": { description: Structured deck analysis }

  /api/decks/compare:
    post:
      operationId: compareDecks
      summary: Compare two decklists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deck_a, deck_b]
              properties:
                deck_a: { type: string }
                deck_b: { type: string }
                include_collection: { type: boolean, default: false }
      responses:
        "200": { description: Structured deck comparison }

  /api/decks/optimize:
    post:
      operationId: optimizeDeck
      summary: Produce structured deck optimization diagnostics
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decklist]
              properties:
                decklist: { type: string }
                format: { type: string }
                constraints: { type: object, additionalProperties: true }
      responses:
        "200": { description: Candidate changes, diagnostics, and warnings }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    CompactCard:
      type: object
      additionalProperties: false
      properties:
        id:
          type: string
          description: Scryfall UUID.
        set:
          type: string
          description: Set code.
        name:
          type: string
          description: Card name.
        number:
          type: string
          description: Collector number.
        rarity:
          type: string
          description: Card rarity.
          enum:
            - common
            - uncommon
            - rare
            - mythic
            - special
            - bonus
        mana_cost:
          type:
            - string
            - "null"
          description: Mana cost.
        cmc:
          type:
            - number
            - "null"
          description: Mana value.
        colors:
          type: array
          description: Parsed colors from mana cost. Colorless cards may have an empty array.
          items:
            type: string
            enum:
              - W
              - U
              - B
              - R
              - G
        type_line:
          type:
            - string
            - "null"
          description: Type line.
        is_basic_land:
          type: boolean
          description: Whether the card is a basic land.
        is_land:
          type: boolean
          description: Whether the card is any land.
        is_booster_eligible:
          type: boolean
          description: Whether the card is eligible for normal boosters.
        is_foil_eligible:
          type: boolean
          description: Whether the card is eligible to be foil.
        image_uri:
          type:
            - string
            - "null"
          format: uri
          description: Direct image URI from the CSV, when available.
        scryfall_uri:
          type:
            - string
            - "null"
          format: uri
          description: Scryfall page URL. Always include this URL next to card names in user-facing answers.
      required:
        - id
        - set
        - name
        - number
        - rarity
        - mana_cost
        - cmc
        - colors
        - type_line
        - is_basic_land
        - is_land
        - is_booster_eligible
        - is_foil_eligible
        - image_uri
        - scryfall_uri

    SetCardsResponse:
      type: object
      additionalProperties: false
      properties:
        set:
          type: string
        meta:
          type:
            - object
            - "null"
          additionalProperties: true
          properties:
            set:
              type: string
            cardCount:
              type: integer
            importedAt:
              type: string
            source:
              type: string
        filters:
          type: object
          additionalProperties: false
          properties:
            rarity:
              type:
                - string
                - "null"
            color:
              type:
                - string
                - "null"
        count:
          type: integer
          description: Total cards matching the current filters.
        returned:
          type: integer
          description: Number of cards returned on this page.
        page:
          type: integer
        pageSize:
          type: integer
        totalPages:
          type: integer
        hasMore:
          type: boolean
        cards:
          type: array
          items:
            $ref: "#/components/schemas/CompactCard"
      required:
        - set
        - meta
        - filters
        - count
        - returned
        - page
        - pageSize
        - totalPages
        - hasMore
        - cards

    SimulatedPackCard:
      allOf:
        - $ref: "#/components/schemas/CompactCard"
        - type: object
          additionalProperties: false
          properties:
            slot:
              type: string
              description: Booster slot that produced this card.
            foil:
              type: boolean
              description: Whether this simulated card came from a foil slot.
            promo:
              type: boolean
              description: Whether this simulated card is a promo.
          required:
            - slot
            - foil
            - promo

    SimulatedPackResponse:
      type: object
      additionalProperties: false
      properties:
        set:
          type: string
        type:
          type: string
          enum:
            - play_booster
            - collector_booster
            - jumpstart_booster
            - prerelease_pool
        count:
          type: integer
        cards:
          type: array
          items:
            $ref: "#/components/schemas/SimulatedPackCard"
      required:
        - set
        - type
        - count
        - cards
  /api/collection/search:
    get:
      operationId: searchCollection
      parameters:
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Collection search result

  /api/collection/check-deck:
    post:
      operationId: checkDeckAgainstCollection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                decklist:
                  type: string
              required:
                - decklist
      responses:
        "200":
          description: Deck ownership comparison
  /api/collection/import:
    post:
      operationId: importCollection
      summary: Import collection CSV (ManaBox format)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                confirmed:
                  type: boolean
                source:
                  type: string
                filename:
                  type: string
              required:
                - file
                - confirmed
      responses:
        "200":
          description: Import processed successfully
        "400":
          description: Invalid request or validation errors
        "401":
          description: Unauthorized
        "500":
          description: Server error
  /api/collection/stats:
    get:
      operationId: getCollectionStats
      summary: Retrieve collection statistics
      responses:
        "200":
          description: Collection statistics summary
        "401":
          description: Unauthorized
        "500":
          description: Server error
  /api/collection/by-location:
    get:
      operationId: getCollectionByLocation
      summary: Get cards by location
      parameters:
        - name: location
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Cards at specified location
        "400":
          description: Missing location parameter
        "401":
          description: Unauthorized
        "500":
          description: Server error
