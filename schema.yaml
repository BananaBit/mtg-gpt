openapi: 3.1.0
info:
  title: MTG GPT Middleware API
  version: 3.0.0
  description: >
    Magic the Gathering middleware for canonical card lookup, physical
    collection synchronization, deterministic ownership checks, structured
    deck analysis, and the existing Redis-backed set and pack tools.

servers:
  - url: https://mtg-gpt-five.vercel.app

paths:
  /api/cards/search:
    get:
      operationId: searchCards
      summary: Search canonical Magic cards
      description: Searches Scryfall or the imported set index by card identifiers and filters.
      security:
        - bearerAuth: []
      parameters:
        - { name: name, in: query, schema: { type: string } }
        - { name: set, in: query, schema: { type: string } }
        - { name: number, in: query, schema: { type: string } }
        - { name: id, in: query, schema: { type: string, format: uuid } }
        - { name: color, in: query, schema: { type: string } }
        - { name: type, in: query, schema: { type: string } }
      responses:
        "200":
          description: Matching cards
          content:
            application/json:
              schema:
                type: object
                required: [success, items]
                properties:
                  success: { type: boolean, const: true }
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/CardRecord" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/ServerError" }

  /api/cards/details:
    get:
      operationId: getCardDetails
      summary: Get canonical details for one card
      description: Resolve by Scryfall ID, exact name, or set plus collector number.
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: query, schema: { type: string, format: uuid } }
        - { name: name, in: query, schema: { type: string } }
        - { name: set, in: query, schema: { type: string } }
        - { name: number, in: query, schema: { type: string } }
      responses:
        "200":
          description: Full Scryfall card details
          content:
            application/json:
              schema:
                type: object
                required: [success, card]
                properties:
                  success: { type: boolean, const: true }
                  card: { $ref: "#/components/schemas/CardRecord" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { description: Card not found }

  /api/collection/import:
    post:
      operationId: importCollection
      summary: Synchronize a physical collection from ManaBox
      description: >
        Imports a complete physical collection snapshot. Use only when the
        user explicitly asks to import or synchronize an attached ManaBox CSV.
        Missing active entries are archived, not deleted. This operation
        requires the import credential rather than the read-only credential.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CollectionImportRequest"
      responses:
        "200":
          description: Import completed, was rejected by validation, or was already current
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CollectionImportCompleted"
                  - $ref: "#/components/schemas/CollectionImportUnchanged"
                  - $ref: "#/components/schemas/CollectionImportRejected"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "413": { description: Request exceeds the configured size limit }

  /api/collection/search:
    get:
      operationId: searchCollection
      summary: Search active physical collection entries
      security:
        - bearerAuth: []
      parameters:
        - { name: name, in: query, description: Partial card-name match, schema: { type: string } }
        - { name: scryfall_id, in: query, schema: { type: string, format: uuid } }
        - { name: set, in: query, schema: { type: string } }
        - { name: collector_number, in: query, schema: { type: string } }
        - { name: location, in: query, schema: { type: string } }
        - { name: finish, in: query, schema: { type: string, enum: [nonfoil, foil, etched] } }
        - { name: condition, in: query, schema: { type: string } }
        - { name: language, in: query, schema: { type: string } }
      responses:
        "200":
          description: Matching active ownership entries and quantity totals
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CollectionSearchResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/collection/stats:
    get:
      operationId: getCollectionStats
      summary: Get active collection statistics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Collection totals, grouped counts, and latest import
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CollectionStatsResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/collection/check-deck:
    post:
      operationId: checkDeckAgainstCollection
      summary: Check deterministic deck ownership coverage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [decklist]
              properties:
                decklist: { type: string }
                match_printing: { type: boolean, default: false }
                include_locations: { type: boolean, default: true }
      responses:
        "200":
          description: Owned, partially owned, and missing quantities
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeckCoverageResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/decks/analyze:
    post:
      operationId: analyzeDeck
      summary: Analyze a decklist into structured facts
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [decklist]
              properties:
                decklist: { type: string }
                format: { type: string }
                include_collection: { type: boolean, default: false }
      responses:
        "200": { description: Structured deck facts and optional collection coverage }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/decks/compare:
    post:
      operationId: compareDecks
      summary: Compare two decklists
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [deck_a, deck_b]
              properties:
                deck_a: { type: string }
                deck_b: { type: string }
                include_collection: { type: boolean, default: false }
      responses:
        "200": { description: Shared cards, deck differences, and optional collection coverage }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/decks/optimize:
    post:
      operationId: optimizeDeck
      summary: Produce structured optimization diagnostics
      description: Returns diagnostics and candidate-change structures; it does not claim to construct a universally optimal deck.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [decklist]
              properties:
                decklist: { type: string }
                format: { type: string }
                constraints:
                  type: object
                  additionalProperties: true
                  properties:
                    owned_only: { type: boolean }
                    maximum_additions: { type: integer, minimum: 0 }
                    preserve_theme: { type: boolean }
      responses:
        "200": { description: Suggested additions/removals, diagnostics, and warnings }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/set-cards:
    get:
      operationId: getSetCards
      summary: Get cards from an imported Redis set database
      security: []
      parameters:
        - { name: set, in: query, required: true, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
        - { name: pageSize, in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 75 } }
        - { name: rarity, in: query, schema: { type: string, enum: [common, uncommon, rare, mythic] } }
        - { name: color, in: query, schema: { type: string, enum: [W, U, B, R, G, C] } }
      responses:
        "200": { description: Compact paginated card list }
        "400": { $ref: "#/components/responses/BadRequest" }

  /api/simulate-pack:
    get:
      operationId: simulatePack
      summary: Simulate a booster product from imported set data
      security: []
      parameters:
        - { name: set, in: query, required: true, schema: { type: string } }
        - name: type
          in: query
          required: true
          schema:
            type: string
            enum: [play_booster, collector_booster, jumpstart_booster, prerelease_pool]
      responses:
        "200": { description: Simulated pack or prerelease pool }
        "400": { $ref: "#/components/responses/BadRequest" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: GPT_ACTION_API_KEY for read actions or GPT_IMPORT_API_KEY for collection imports.
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:
    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success: { type: boolean, const: false }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }

    CardRecord:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        scryfall_id: { type: string }
        oracle_id: { type: string }
        name: { type: string }
        set: { type: string }
        set_code: { type: string }
        collector_number: { type: string }
        mana_cost: { type: string }
        cmc: { type: number }
        type_line: { type: string }
        oracle_text: { type: string }
        scryfall_uri: { type: string, format: uri }

    CollectionImportRequest:
      type: object
      additionalProperties: false
      required: [source, csv, mode, confirmed]
      properties:
        source: { type: string, const: manabox }
        filename: { type: string }
        csv: { type: string, description: Raw UTF-8 CSV content from the ManaBox export. }
        mode: { type: string, const: synchronize }
        confirmed: { type: boolean, const: true }

    ImportWarning:
      type: object
      required: [row, code, message]
      properties:
        row: { type: integer }
        code: { type: string }
        message: { type: string }

    CollectionImportCompleted:
      type: object
      required: [success, status, import_id, source_rows, normalized_entries, total_copies]
      properties:
        success: { type: boolean, const: true }
        status: { type: string, const: completed }
        import_id: { type: string, format: uuid }
        source: { type: string }
        filename: { type: [string, "null"] }
        source_rows: { type: integer }
        normalized_entries: { type: integer }
        total_copies: { type: integer }
        inserted_entries: { type: integer }
        updated_entries: { type: integer }
        unchanged_entries: { type: integer }
        archived_entries: { type: integer }
        warning_count: { type: integer }
        warnings:
          type: array
          items: { $ref: "#/components/schemas/ImportWarning" }

    CollectionImportUnchanged:
      type: object
      required: [success, status, previous_import_id, message]
      properties:
        success: { type: boolean, const: true }
        status: { type: string, const: unchanged }
        previous_import_id: { type: string, format: uuid }
        message: { type: string }

    CollectionImportRejected:
      type: object
      required: [success, status, errors, warnings]
      properties:
        success: { type: boolean, const: false }
        status: { type: string, const: rejected }
        import_id: { type: string, format: uuid }
        errors: { type: array, items: { $ref: "#/components/schemas/ImportError" } }
        warnings: { type: array, items: { $ref: "#/components/schemas/ImportWarning" } }

    ImportError:
      type: object
      additionalProperties: true
      properties:
        row: { type: integer }
        field: { type: string }
        code: { type: string }
        message: { type: string }

    OwnedCard:
      type: object
      properties:
        scryfall_id: { type: [string, "null"], format: uuid }
        name: { type: string }
        set_code: { type: [string, "null"] }
        collector_number: { type: [string, "null"] }
        quantity: { type: integer, minimum: 1 }
        finish: { type: string, enum: [nonfoil, foil, etched] }
        condition: { type: [string, "null"] }
        language: { type: string }
        location: { type: string }

    CollectionSearchResponse:
      type: object
      required: [query, total_entries, total_copies, items]
      properties:
        query:
          type: object
          additionalProperties: true
          properties:
            name: { type: string }
            setCode: { type: string }
            collectorNumber: { type: string }
            location: { type: string }
            finish: { type: string }
            condition: { type: string }
            language: { type: string }
            scryfallId: { type: string }
        total_entries: { type: integer }
        total_copies: { type: integer }
        items: { type: array, items: { $ref: "#/components/schemas/OwnedCard" } }

    CollectionStatsResponse:
      type: object
      required: [distinct_entries, unique_card_names, total_copies, foil_copies, locations]
      properties:
        distinct_entries: { type: integer }
        unique_card_names: { type: integer }
        total_copies: { type: integer }
        foil_copies: { type: integer }
        locations: { type: integer }
        by_location:
          type: object
          properties: {}
          additionalProperties: { type: integer }
        by_finish:
          type: object
          properties: {}
          additionalProperties: { type: integer }
        by_condition:
          type: object
          properties: {}
          additionalProperties: { type: integer }
        by_language:
          type: object
          properties: {}
          additionalProperties: { type: integer }
        by_set:
          type: object
          properties: {}
          additionalProperties: { type: integer }
        last_import:
          type: [object, "null"]
          properties:
            id: { type: string, format: uuid }
            source: { type: string }
            completed_at: { type: string, format: date-time }

    DeckCoverageResponse:
      type: object
      required: [summary, owned, partially_owned, missing, unparsed_lines]
      properties:
        summary:
          type: object
          required: [requested_copies, owned_copies, missing_copies, coverage_percent]
          properties:
            requested_copies: { type: integer }
            owned_copies: { type: integer }
            missing_copies: { type: integer }
            coverage_percent: { type: number }
        owned: { type: array, items: { $ref: "#/components/schemas/CoverageItem" } }
        partially_owned: { type: array, items: { $ref: "#/components/schemas/CoverageItem" } }
        missing: { type: array, items: { $ref: "#/components/schemas/CoverageItem" } }
        unparsed_lines: { type: array, items: { $ref: "#/components/schemas/UnparsedLine" } }

    CoverageItem:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name: { type: string }
        required: { type: integer }
        owned: { type: integer }
        missing: { type: integer }
        locations: { type: array, items: { type: string } }

    UnparsedLine:
      type: object
      additionalProperties: false
      required: [line_number, text]
      properties:
        line_number: { type: integer }
        text: { type: string }
