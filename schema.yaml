openapi: 3.1.0
info:
  title: MTG GPT Actions
  version: 3.2.0
  description: Card, collection, deck, set, and pack actions.

servers:
  - url: https://mtg-gpt-five.vercel.app

security:
  - bearerAuth: []

paths:
  /api/cards/search:
    get:
      operationId: searchCards
      summary: Search cards
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: set
          in: query
          schema:
            type: string
        - name: number
          in: query
          schema:
            type: string
        - name: id
          in: query
          schema:
            type: string
        - name: color
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Matching cards.

  /api/cards/details:
    get:
      operationId: getCardDetails
      summary: Get card details
      parameters:
        - name: id
          in: query
          schema:
            type: string
        - name: name
          in: query
          schema:
            type: string
        - name: set
          in: query
          schema:
            type: string
        - name: number
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Card details.

  /api/collection/search:
    get:
      operationId: searchCollection
      summary: Search owned cards
      parameters:
        - name: name
          in: query
          schema:
            type: string
        - name: scryfall_id
          in: query
          schema:
            type: string
        - name: set
          in: query
          schema:
            type: string
        - name: collector_number
          in: query
          schema:
            type: string
        - name: location
          in: query
          schema:
            type: string
        - name: finish
          in: query
          schema:
            type: string
        - name: condition
          in: query
          schema:
            type: string
        - name: language
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Owned cards.

  /api/collection/stats:
    get:
      operationId: getCollectionStats
      summary: Get collection statistics
      responses:
        "200":
          description: Collection statistics.

  /api/collection/check-deck:
    post:
      operationId: checkDeckAgainstCollection
      summary: Check deck ownership
      x-openai-isConsequential: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                decklist:
                  type: string
                match_printing:
                  type: boolean
                include_locations:
                  type: boolean
              required:
                - decklist
      responses:
        "200":
          description: Deck ownership.

  /api/decks/analyze:
    post:
      operationId: analyzeDeck
      summary: Analyze a deck
      x-openai-isConsequential: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                decklist:
                  type: string
                format:
                  type: string
                include_collection:
                  type: boolean
              required:
                - decklist
      responses:
        "200":
          description: Deck analysis.

  /api/decks/compare:
    post:
      operationId: compareDecks
      summary: Compare two decks
      x-openai-isConsequential: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                deck_a:
                  type: string
                deck_b:
                  type: string
                include_collection:
                  type: boolean
              required:
                - deck_a
                - deck_b
      responses:
        "200":
          description: Deck comparison.

  /api/decks/optimize:
    post:
      operationId: optimizeDeck
      summary: Diagnose deck improvements
      x-openai-isConsequential: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                decklist:
                  type: string
                format:
                  type: string
                constraints:
                  type: object
                  properties:
                    owned_only:
                      type: boolean
                    maximum_additions:
                      type: integer
                    preserve_theme:
                      type: boolean
              required:
                - decklist
      responses:
        "200":
          description: Deck diagnostics.

  /api/set-cards:
    get:
      operationId: getSetCards
      summary: Get cards from a set
      security: []
      parameters:
        - name: set
          in: query
          required: true
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: pageSize
          in: query
          schema:
            type: integer
        - name: rarity
          in: query
          schema:
            type: string
        - name: color
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Set cards.

  /api/simulate-pack:
    get:
      operationId: simulatePack
      summary: Simulate a booster product
      security: []
      parameters:
        - name: set
          in: query
          required: true
          schema:
            type: string
        - name: type
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Simulated product.

components:
  schemas: {}
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
